<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarah Kohl</title>
    <script>
      // Companion to public/404.html — restores the real URL before React
      // Router mounts, so direct links and refreshes work on GitHub Pages.
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= query param written by 404.html
        var search = window.location.search;
        if (search.slice(1, 3) === 'p=') {
          var decoded = decodeURIComponent(search.slice(3));
          var parts = decoded.split('&');
          var path = parts[0];
          var query = parts.length > 1 ? '?' + parts.slice(1).join('&') : '';
          window.history.replaceState(null, null, '/' + path + query);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
